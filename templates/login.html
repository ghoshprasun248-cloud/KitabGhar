{% extends "base.html" %}


{% block title %}

Login - KitabGhar

{% endblock %}





{% block content %}



<div class="container mt-5">


<div class="row justify-content-center">


<div class="col-md-5">





<div class="card shadow">


<div class="card-header bg-dark text-white text-center">


<h3>

🔐 Login

</h3>


</div>





<div class="card-body">





<form method="POST"
      action="{{ url_for('auth.login') }}">





<!-- Email -->

<div class="mb-3">


<label class="form-label">

Email Address

</label>



<input type="email"
       name="email"
       class="form-control"
       placeholder="Enter email"
       required>


</div>







<!-- Password -->

<div class="mb-3">


<label class="form-label">

Password

</label>



<input type="password"
       name="password"
       class="form-control"
       placeholder="Enter password"
       required>


</div>







<!-- Remember Me -->


<div class="form-check mb-3">


<input class="form-check-input"
       type="checkbox"
       name="remember"
       id="remember">


<label class="form-check-label"
       for="remember">


Remember me


</label>


</div>







<button type="submit"
        class="btn btn-primary w-100">


Login


</button>






</form>






<hr>






<p class="text-center">


Don't have an account?


<a href="{{ url_for('auth.register') }}">


Create Account


</a>


</p>






</div>


</div>






</div>


</div>


</div>





{% endblock %}
